server.port=5050

spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.auto-index-creation=true
spring.config.import=optional:file:.env[.properties]

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

clerk.issuer=https://together-camel-32.clerk.accounts.dev
clerk.jwks-url=https://together-camel-32.clerk.accounts.dev/.well-known/jwks.json

cloudshare.razorpay.key-id=${RAZORPAY_KEY_ID}
cloudshare.razorpay.key-secret=${RAZORPAY_KEY_SECRET}
cloudshare.razorpay.currency=INR
cloudshare.razorpay.credit-price-paise=10000

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=50MB